# ===== Streamlit Secrets 模板（可安全提交到 Git）=====
# 用法：复制本文件为 .streamlit/secrets.toml 并填入真实密钥
# 注意：.streamlit/secrets.toml 已在 .gitignore 中忽略，永远不会被提交
#
# 安全提醒：
#   1. 阿里云 AccessKey 等同于你账号的密码，切勿提交到任何仓库。
#   2. OSS bucket 必须设为「私有」，不要公开读。
#   3. 若密钥曾泄露，第一时间到阿里云控制台「禁用 / 删除」该 AccessKey，
#      并重新生成一对新 Key 填到 secrets.toml。

# 阿里云 OSS（存放内部数据，bucket 设为私有）
OSS_ACCESS_KEY = "YOUR_ALIYUN_ACCESS_KEY_ID"
OSS_SECRET_KEY = "YOUR_ALIYUN_ACCESS_KEY_SECRET"
